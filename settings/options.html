<!DOCTYPE html>
<html>
	<head>
		<link rel="stylesheet" href="options.css">
	</head>
	<body>
		<form>
			<table>
				<tr>
					<th id="section_settings" colspan="2"></th>
				</tr>
				<tr>
					<td><label id="l_set_notation" for="set_notation"></label></td><td><select id="set_notation"></select></td>
				</tr>
				<tr>
					<td><input id="button_save" type="button"></td><td><input id="button_reset" type="button"></td>
				</tr>
				<tr>
					<td colspan="2"><hr></td>
				</tr>
				<tr>
					<th id="section_updown" colspan="2"></th>
				</tr>
				<tr>
					<td><label id="l_select_sync_up" for="select_sync_up"></label></td><td><select id="select_sync_up" multiple></select></td>
				</tr>
				<tr>
					<td><input id="sync_up_selected" type="button"></td><td><input id="sync_up_all" type="button"></td>
				</tr>
				<tr>
					<td><label id="l_select_sync_down" for="select_sync_down"></label></td><td><select id="select_sync_down" multiple></select></td>
				</tr>
				<tr>
					<td><input id="sync_down_selected" type="button"></td><td><input id="sync_down_all" type="button"></td>
				</tr>
				<tr>
					<td colspan="2"><hr></td>
				</tr>
				<tr>
					<th id="section_delete" class="dangerzone" colspan="2"></th>
				</tr>
				<tr>
					<td colspan="2"><input id="delete_local" type="button"></td>
				</tr>
				<tr>
					<td colspan="2"><input id="delete_sync" type="button"></td>
				</tr>
				<tr>
					<td colspan="2"><input id="delete_all" class="crit-button" type="button"></td>
				</tr>
			</table>
		</form>
		<div id="error_display" class="hidden"></div>
		<script src="options.js"></script>
	</body>
</html>
